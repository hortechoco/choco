<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horte · Acceso</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="settings.js"></script>
  <script src="theme.js"></script>
</head>
<body>

  <div class="login-screen d-flex align-items-center justify-content-center">
    <div class="login-card">

      <button class="btn-toggle-tema btn-login-tema" title="Cambiar tema"><i class="bi bi-sun"></i></button>

      <div class="login-logo mb-4 text-center">
        <div class="brand-name-lg">Horte</div>
        <div class="brand-sub-lg">Sistema de gestión</div>
      </div>

      <div class="auth-tabs mb-4">
        <button class="auth-tab active" data-tab="login">Ingresar</button>
        <button class="auth-tab"        data-tab="register">Registrarse</button>
      </div>

      <!-- ── LOGIN ── -->
      <div id="tab-login">
        <div class="mb-3">
          <label class="label-luxury mb-1">Teléfono</label>
          <div class="input-group">
            <span class="input-group-text luxury-prefix"><i class="bi bi-telephone"></i></span>
            <input type="tel" id="login-tel" class="form-control input-luxury"
                   placeholder="Ej: 70012345" autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label class="label-luxury mb-1">PIN de 4 dígitos</label>
          <input type="password" id="login-pin" class="form-control input-luxury"
                 maxlength="4" placeholder="• • • •" inputmode="numeric" autocomplete="current-password">
        </div>
        <button id="btn-login" class="btn btn-luxury w-100">
          <span id="login-label">Ingresar</span>
          <span id="login-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
        </button>
      </div>

      <!-- ── REGISTRO (solo crea clientes) ── -->
      <div id="tab-register" class="d-none">
        <div class="row g-3">
          <div class="col-12">
            <label class="label-luxury mb-1">Carnet de identidad</label>
            <div class="input-group">
              <span class="input-group-text luxury-prefix"><i class="bi bi-credit-card-2-front"></i></span>
              <input type="text" id="reg-ci" class="form-control input-luxury" placeholder="Ej: 12345678" autocomplete="off">
            </div>
          </div>
          <div class="col-12">
            <label class="label-luxury mb-1">Nombres y apellidos</label>
            <div class="input-group">
              <span class="input-group-text luxury-prefix"><i class="bi bi-person"></i></span>
              <input type="text" id="reg-nombre" class="form-control input-luxury" placeholder="Nombre completo" autocomplete="name">
            </div>
          </div>
          <div class="col-12">
            <label class="label-luxury mb-1">Teléfono</label>
            <div class="input-group">
              <span class="input-group-text luxury-prefix"><i class="bi bi-telephone"></i></span>
              <input type="tel" id="reg-tel" class="form-control input-luxury" placeholder="Ej: 70012345" autocomplete="tel">
            </div>
          </div>
          <div class="col-12">
            <label class="label-luxury mb-1">Dirección particular</label>
            <div class="input-group">
              <span class="input-group-text luxury-prefix"><i class="bi bi-geo-alt"></i></span>
              <input type="text" id="reg-direccion" class="form-control input-luxury"
                     placeholder="Calle, número, referencia" autocomplete="street-address">
            </div>
          </div>
          <div class="col-12">
            <label class="label-luxury mb-1">PIN de 4 dígitos</label>
            <input type="password" id="reg-pin" class="form-control input-luxury"
                   maxlength="4" placeholder="• • • •" inputmode="numeric" autocomplete="new-password">
          </div>
        </div>
        <button id="btn-register" class="btn btn-luxury w-100 mt-3">
          <span id="register-label">Crear cuenta</span>
          <span id="register-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
        </button>
      </div>

      <p id="auth-error" class="text-danger text-center mt-3 small d-none"></p>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="ui.js"></script>
  <script src="auth.js"></script>
  <script>
    // ── Tabs ──────────────────────────────────────────
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-login').classList.toggle('d-none', tab.dataset.tab !== 'login');
        document.getElementById('tab-register').classList.toggle('d-none', tab.dataset.tab !== 'register');
        document.getElementById('auth-error').classList.add('d-none');
      });
    });

    // ── PIN numérico ──────────────────────────────────
    ['login-pin', 'reg-pin'].forEach(id => {
      document.getElementById(id)?.addEventListener('input', e => {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0, 4);
      });
    });

    // ── Enter key ─────────────────────────────────────
    ['login-tel', 'login-pin'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-login').click();
      });
    });
    ['reg-ci', 'reg-nombre', 'reg-tel', 'reg-direccion', 'reg-pin'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-register').click();
      });
    });

    // ── Redirección por rol ────────────────────────────
    function _redirigir() {
      if (Auth.esCliente)     window.location.href = 'cliente.html';
      else if (Auth.esAdmin)  window.location.href = 'admin.html';
      else                    window.location.href = 'vendedor.html';
    }

    // ── Sesión existente ──────────────────────────────
    (async () => {
      const ok = await Auth.iniciar();
      if (ok) _redirigir();
    })();

    // ── Login ─────────────────────────────────────────
    document.getElementById('btn-login').addEventListener('click', async () => {
      const tel     = document.getElementById('login-tel').value.trim();
      const pin     = document.getElementById('login-pin').value;
      const errEl   = document.getElementById('auth-error');
      const spinner = document.getElementById('login-spinner');
      const label   = document.getElementById('login-label');

      errEl.classList.add('d-none');
      spinner.classList.remove('d-none');
      label.textContent = 'Ingresando...';

      try {
        await Auth.signIn(tel, pin);
        _redirigir();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
      } finally {
        spinner.classList.add('d-none');
        label.textContent = 'Ingresar';
      }
    });

    // ── Register ──────────────────────────────────────
    document.getElementById('btn-register').addEventListener('click', async () => {
      const errEl   = document.getElementById('auth-error');
      const spinner = document.getElementById('register-spinner');
      const label   = document.getElementById('register-label');

      errEl.classList.add('d-none');
      spinner.classList.remove('d-none');
      label.textContent = 'Creando cuenta...';

      try {
        await Auth.register({
          ci:        document.getElementById('reg-ci').value.trim(),
          nombre:    document.getElementById('reg-nombre').value.trim(),
          tel:       document.getElementById('reg-tel').value.trim(),
          direccion: document.getElementById('reg-direccion').value.trim(),
          pin:       document.getElementById('reg-pin').value,
        });
        _redirigir();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('d-none');
      } finally {
        spinner.classList.add('d-none');
        label.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
