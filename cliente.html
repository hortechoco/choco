<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horte · Tienda</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="settings.js"></script>
  <script src="theme.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-luxury sticky-top">
    <div class="container-fluid px-3 px-md-4">
      <span class="navbar-brand-luxury">
        <span class="brand-name">Horte</span>
        <span class="brand-sep">·</span>
        <span class="brand-module">Tienda</span>
      </span>
      <div class="d-flex align-items-center gap-2 gap-md-3">
        <span class="user-badge" id="storefront-user-badge"></span>
        <button class="btn-icon btn-toggle-tema" title="Cambiar tema"><i class="bi bi-sun"></i></button>
        <button id="btn-logout-storefront" class="btn-icon" title="Cerrar sesión"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </div>
  </nav>

  <!-- STOREFRONT MAIN -->
  <div id="storefront-view" class="container py-4" style="max-width:1000px">
    <div class="view-header mb-4">
      <h1 class="view-title">Catálogo</h1>
      <p class="view-subtitle">Selecciona productos y realiza tu pedido</p>
    </div>

    <div class="row g-4">

      <!-- Catálogo -->
      <div class="col-lg-6">
        <div class="luxury-card p-4 h-100">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h5 class="card-section-title mb-0">Productos</h5>
            <input type="text" id="storefront-buscar" class="form-control form-control-sm input-luxury"
              style="max-width:160px" placeholder="Buscar...">
          </div>
          <div id="storefront-catalogo" class="catalogo-grid">
            <div class="empty-state">Cargando...</div>
          </div>
        </div>
      </div>

      <!-- Pedido -->
      <div class="col-lg-6">
        <div class="luxury-card p-4 d-flex flex-column" style="min-height:520px">
          <h5 class="card-section-title mb-3">Mi pedido</h5>
          <div id="storefront-carrito-items" class="carrito-list flex-grow-1">
            <div class="empty-state text-center py-5">
              <i class="bi bi-bag" style="font-size:2rem;opacity:.2"></i>
              <p class="mt-2 small">Aún no has agregado productos</p>
            </div>
          </div>

          <div class="carrito-footer mt-3">
            <!-- Tipo entrega -->
            <div class="mb-3">
              <label class="label-luxury mb-2">Tipo de entrega</label>
              <div class="d-flex gap-2">
                <button class="btn btn-entrega active" data-tipo="recogida"><i class="bi bi-shop me-1"></i>Recogida</button>
                <button class="btn btn-entrega" data-tipo="domicilio"><i class="bi bi-bicycle me-1"></i>Domicilio</button>
              </div>
            </div>
            <div id="storefront-cargo-row" class="mb-3 d-none">
              <label class="label-luxury mb-1">Cargo domicilio ($)</label>
              <input type="number" id="storefront-cargo" class="form-control input-luxury" min="0" step="0.01" value="0">
            </div>

            <!-- Pago -->
            <div class="mb-3">
              <label class="label-luxury mb-1">Método de pago</label>
              <select id="storefront-metodo-pago" class="form-select input-luxury">
                <option value="efectivo">Efectivo</option>
                <option value="transferencia">Transferencia</option>
                <option value="tarjeta">Tarjeta</option>
              </select>
            </div>

            <!-- Notas -->
            <div class="mb-3">
              <label class="label-luxury mb-1">Notas (opcional)</label>
              <textarea id="storefront-notas" class="form-control input-luxury" rows="2"
                placeholder="Indicaciones especiales..."></textarea>
            </div>

            <!-- Totales -->
            <div class="carrito-total mb-3">
              <div class="d-flex justify-content-between mb-1">
                <span class="label-luxury">Subtotal</span>
                <span id="storefront-subtotal">$0.00</span>
              </div>
              <div id="storefront-cargo-display" class="d-flex justify-content-between mb-1" style="display:none!important">
                <span class="label-luxury">Domicilio</span>
                <span id="storefront-cargo-valor">$0.00</span>
              </div>
              <div class="d-flex justify-content-between total-line mt-2 pt-2">
                <strong>Total</strong>
                <strong id="storefront-total" class="text-gold">$0.00</strong>
              </div>
            </div>

            <button id="btn-confirmar-pedido" class="btn btn-luxury w-100" disabled>
              <i class="bi bi-check2-circle me-2"></i>Confirmar pedido
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- LOADER -->
  <div id="global-loader" class="global-loader d-none"><div class="loader-ring"></div></div>
  <!-- TOASTS -->
  <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="notificaciones.js"></script>
  <script src="ui.js"></script>
  <script src="auth.js"></script>
  <script src="storefront.js"></script>
  <script>
    (async function () {
      const ok = await Auth.iniciar();
      if (!ok)             { window.location.href = 'index.html'; return; }
      if (!Auth.esCliente) { window.location.href = Auth.esAdmin ? 'admin.html' : 'vendedor.html'; return; }

      document.getElementById('btn-logout-storefront').addEventListener('click', () => {
        Auth.signOut();
        window.location.href = 'index.html';
      });

      await Storefront.iniciar();
    })();
  </script>
</body>
</html>
